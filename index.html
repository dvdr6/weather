<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyCast – Weather App</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="app-wrapper">
      <header class="app-header">
        <div class="logo-wrap">
          <svg class="logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="20" r="9" fill="#FFD166" />
            <path d="M24 4V7M24 33V36M4 20H7M41 20H44M8.34 7.34L10.46 9.46M37.54 7.34L35.42 9.46M8.34 32.66L10.46 30.54M37.54 32.66L35.42 30.54" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round"/>
            <rect x="6" y="30" width="28" height="11" rx="5.5" fill="white" fill-opacity="0.92"/>
            <rect x="10" y="37" width="32" height="8" rx="4" fill="white" fill-opacity="0.75"/>
          </svg>
          <span class="logo-text">SkyCast</span>
        </div>
        <p class="tagline">Real-time weather, anywhere.</p>
      </header>

      <div class="search-section">
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="M20 20L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input type="text" id="cityInput" placeholder="Search for a city..." autocomplete="off" spellcheck="false" />
          <button id="searchBtn">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 12H19M13 6L19 12L13 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div id="suggestions" class="suggestions hidden"></div>
      </div>

      <div id="errorMsg" class="error-msg hidden">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span id="errorText">City not found. Please try again.</span>
      </div>

      <div id="weatherCard" class="weather-card hidden">
        <div class="card-top">
          <div class="city-info">
            <h2 id="cityName">—</h2>
            <p id="countryName">—</p>
          </div>
          <div class="weather-icon-wrap">
            <div id="weatherIcon" class="weather-icon">☀️</div>
          </div>
        </div>

        <div class="temp-row">
          <span id="temperature" class="temp-main">—</span>
          <div class="temp-units">
            <button class="unit-btn active" id="btnC">°C</button>
            <span class="unit-sep">|</span>
            <button class="unit-btn" id="btnF">°F</button>
          </div>
        </div>

        <p id="weatherDesc" class="weather-desc">—</p>

        <div class="stats-grid">
          <div class="stat-card">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 2a6 6 0 0 1 6 6c0 4-6 13-6 13S6 12 6 8a6 6 0 0 1 6-6z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="8" r="2" fill="currentColor"/></svg>
            <span class="stat-label">Feels Like</span>
            <span id="feelsLike" class="stat-value">—</span>
          </div>
          <div class="stat-card">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 3v1M12 20v1M4.22 4.22l.7.7M18.36 18.36l.7.7M3 12h1M20 12h1M4.22 19.78l.7-.7M18.36 5.64l.7-.7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/></svg>
            <span class="stat-label">UV Index</span>
            <span id="uvIndex" class="stat-value">—</span>
          </div>
          <div class="stat-card">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C8 2 5 5.5 5 9c0 5 7 13 7 13s7-8 7-13c0-3.5-3-7-7-7z" stroke="currentColor" stroke-width="2"/><path d="M9 12l1.5 1.5L15 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="stat-label">Humidity</span>
            <span id="humidity" class="stat-value">—</span>
          </div>
          <div class="stat-card">
            <svg viewBox="0 0 24 24" fill="none"><path d="M5 10.5C5 7.46 7.46 5 10.5 5S16 7.46 16 10.5c0 1.5-.56 2.86-1.47 3.9L20 19.88 18.88 21 13.4 15.47A5.48 5.48 0 0 1 10.5 16C7.46 16 5 13.54 5 10.5z" stroke="currentColor" stroke-width="2"/></svg>
            <span class="stat-label">Visibility</span>
            <span id="visibility" class="stat-value">—</span>
          </div>
          <div class="stat-card">
            <svg viewBox="0 0 24 24" fill="none"><path d="M17 7.5A4.5 4.5 0 0 1 12.5 12H4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M19 13a3 3 0 0 1-3 3H4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <span class="stat-label">Wind</span>
            <span id="windSpeed" class="stat-value">—</span>
          </div>
          <div class="stat-card">
            <svg viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <span class="stat-label">Pressure</span>
            <span id="pressure" class="stat-value">—</span>
          </div>
        </div>

        <div class="sun-row">
          <div class="sun-item">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 5V3M6.35 7.65 4.93 6.22M5 12H3M6.35 16.35l-1.42 1.43M12 21v-2M17.65 16.35l1.42 1.43M19 12h2M17.65 7.65l1.42-1.43" stroke="#FFD166" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="4" fill="#FFD166" opacity="0.9"/></svg>
            <div>
              <span class="sun-label">Sunrise</span>
              <span id="sunrise" class="sun-val">—</span>
            </div>
          </div>
          <div class="sun-divider"></div>
          <div class="sun-item">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 3v1M5.64 5.64l.71.71M3 12h1M5.64 18.36l.71-.71M12 21v-1M18.36 18.36l-.71-.71M21 12h-1M18.36 5.64l-.71.71" stroke="#f97316" stroke-width="2" stroke-linecap="round"/><path d="M4 17h16" stroke="#f97316" stroke-width="2" stroke-linecap="round"/><path d="M8 17a4 4 0 0 1 8 0" stroke="#f97316" stroke-width="2"/></svg>
            <div>
              <span class="sun-label">Sunset</span>
              <span id="sunset" class="sun-val">—</span>
            </div>
          </div>
        </div>

        <div class="forecast-section">
          <h3 class="forecast-title">7-Day Forecast</h3>
          <div id="forecastList" class="forecast-list"></div>
        </div>
      </div>

      <div id="skeleton" class="skeleton-wrap hidden">
        <div class="sk sk-title"></div>
        <div class="sk sk-sub"></div>
        <div class="sk sk-temp"></div>
        <div class="sk sk-grid">
          <div class="sk sk-box"></div>
          <div class="sk sk-box"></div>
          <div class="sk sk-box"></div>
          <div class="sk sk-box"></div>
          <div class="sk sk-box"></div>
          <div class="sk sk-box"></div>
        </div>
      </div>

      <footer class="app-footer">
        <p>Powered by <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> & <a href="https://nominatim.openstreetmap.org" target="_blank">Nominatim</a></p>
      </footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
